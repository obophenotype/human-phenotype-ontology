id: uuid:f323b990-dc1c-43c0-9dc2-1224324ad5e9
type: NodeTextDefinitionChange
old_value: A diminished ability to experience, express, or connect with emotions whether
  positive or negative. This state is often characterized by a pervasive sense of
  emotional disconnection or detachment, where the individual may report feeling \"numb\"
  or lacking emotional responses that were previously present. The reduction in emotional
  response can range from mild dampening of emotional responses to a near-total absence
  of emotional engagement. It is essential to consider the individual's baseline emotional
  capacity, as changes may be more significant in those who previously had a wide
  emotional range.
new_value: A diminished ability to experience, express, or connect with emotions across
  both positive and negative valences. This state is often characterized by a pervasive
  sense of emotional disconnection or detachment, where the individual may report
  feeling \"numb\" or lacking emotional responses that were previously present. The
  reduction can range from mild dampening of emotional responses to a near-total absence
  of emotional engagement. It is important to consider the individual's baseline emotional
  competence, as changes in emotional capacity may be more indicative of this phenomenon
  in those with a previously broad emotional range.
about_node: HP:0030213

