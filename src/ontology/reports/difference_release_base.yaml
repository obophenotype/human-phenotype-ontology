  recognizable sialo-ganglioside in the blood circulation.
new_value: The concentration of carbohydrate antigen 19-9 (CA19-9) in the blood circulation
  is above the upper limit of normal. CA 19-9, also known as sialyl Lewis A, is a
  tetrasaccharide overexpressed on a wide range of cancerous cells. CA 19-9 is a tumor-associated
  carbohydrate antigen (TACAs) that is both a local (anchored on cell surface or tumor
  site) and shed (in systemic circulation) antigen. CA 19-9 is expressed at low levels
  in normal tissues but overexpressed in cancer cells.
