id: uuid:a0c77668-0c20-4b65-aa5b-935b9ac1ae75
type: NewTextDefinition
new_value: A lack of smooth, physiological alignment or movement between the scapula
  (shoulder blade) and the posterior thoracic wall (the rib cage). The scapulothoracic
  joint is unique, as it lacks true synovial articulation and is dynamically controlled
  through surrounding muscular contractions. The scapula glides on the posterior thorax
  covered with muscle layers rather than a cartilaginous surface. This feature can
  be ascertained by radiography or CT scan of the scapula showing incongruity of the
  scapulothoracic space.
about_node: HP:0020319

