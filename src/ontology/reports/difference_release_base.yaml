id: uuid:83469dd0-9991-4225-b987-9164b51f8bc1
type: NodeTextDefinitionChange
old_value: Abnormal decrease of T cell proliferation in response to stimulation with
  phytohaemagglutinin. This is commonly measured through intracellular expression
  of Ki67, decreasing surface expression of carboxyfluorescein diacetate (CFSE), or
  3H-thymidine incorporation. Length of incubation and strength of stimulation may
  vary between laboratories.
new_value: 'Def: A reduced rate of T lymphocyte transformation in response to in vitro
  stimulation to the mitogen phytohemagglutinin (PHA). Following PHA stimulation,
  T cells normally undergo morphological and biochemical alterations that reflect
  the transformation into lymphoblasts. There are several methods for quantifying
  this effect including measuring the uptake of the radioactive marker 3H-TdR, methyl
  thiazolyl tetrazolium colorimetric analysis (MTT assay), and morphological examination
  under the microscope or using a hematology analyzer. Various types of stimulation
  index compare the amount of proliferation between treated and control cells. An
  impaired test refers to a result in which the amount of stimulation is subnormal.'
about_node: HP:0025834

