id: uuid:38e4c97c-7ff5-4d2e-890c-6787ad37b2b4
type: NewTextDefinition
new_value: A biopsy finding in breast tissue of enlarged epithelial cells with abundant
  granular eosinophilic cytoplasm that can show apical snouting. Metaplastic apocrine
  cells within the breast are similar to normal axillary, areolar and perineal apocrine
  cells, having apocrine secretions and identical staining reactions. One of the reasons,
  however, that these are often not regarded as normal components is that examples
  of gradual metaplastic change from the normal cuboidal epithelium can be seen and
  cells with intermediate features can also be discerned on careful examination, suggesting
  that these are true metaplasia.
about_node: HP:0020329

