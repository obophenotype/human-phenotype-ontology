id: uuid:5b0f093b-2d6e-4ae5-8510-2143550dd68d
type: NewTextDefinition
new_value: Unremitting, positive visual phenomena, present in the entire visual field
  and characterized by uncountable tiny flickering dots interposed between the person's
  vision and the background. The dots are said to resemble static and are typically
  black and white but can also be colored, flashing, or transparent. In addition to
  the static, or snow, patients can experience additional visual symptoms of either
  direct neurological origin, such as palinopsia, photophobia, and nyctalopia (i.e.,
  impaired night vision), or that arise from the optic apparatus.
about_node: HP:0020331

