id: uuid:131b31ee-8677-4620-b570-13144db28050
type: NodeTextDefinitionChange
old_value: Darkening of the area of skin that overlies the shin.
new_value: Pretibial plaques occur in a specific pattern with hyperpigmentation, atrophy
  or induration and scarring of the lower limbs typically over the pretibial area.
  Hyperpigmentation appears to develop gradually from mild, brownish hyperpigmented
  patches clinically in keeping with haemosiderin deposition, to indurated or atrophic
  plaques and can progress to cover the entire circumference of the calf. Plaques
  are often associated with skin fragility, whether atrophic or indurated. They are
  thought to be a result of extensive bruising and confluent atrophic scars because
  of the increased fragility of dermis and small blood vessels.
about_node: HP:0034517

