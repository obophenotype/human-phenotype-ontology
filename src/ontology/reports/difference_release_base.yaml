---
id: uuid:ae93a1d3-2bb6-4055-b1d1-95327a25ae3f
type: NewTextDefinition
new_value: A reproductive relationship between two individuals who are related by
  blood as second cousins or closer. In a medical and genetic context, consanguinity
  increases the coefficient of inbreeding, raising the probability that an offspring
  will inherit identical alleles from a common ancestor (homozygosity by descent).
  This significantly increases the risk for autosomal recessive disorders, such as
  inborn errors of immunity, metabolic diseases, and rare neurodevelopmental syndromes.
  A history of consanguinity serves as a vital clinical marker for directing diagnostic
  investigations toward recessive genetic etiologies, especially in the presence of
  rare phenotypes or unexplained family medical history.
about_node: HP:5210275

