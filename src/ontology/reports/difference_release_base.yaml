id: uuid:2b56c43b-179d-400e-b353-e45ab7bab701
type: NewTextDefinition
new_value: Lisfranc injuries refer to bony or ligamentous compromise of the tarsometatarsal
  and intercuneiform joint complex and include a spectrum of injuries ranging from
  a stable, partial sprain to a grossly displaced and unstable fracture or fracture-dislocation
  of the midfoot. Foot x-ray shows either widening of the space between the 1st and
  2nd metatarsal to over 2mm at the base, dorsal displacement of the base of the 1st
  or 2nd metatarsal, discontinuity of a line drawn from the medial base of the 2nd
  metatarsal to the medial side of the medial cuneiform, irregularity between the
  medial side of the 5th metatarsal base and the medial side of the cuboid, or disruption
  of the line connecting the medial aspect of the navicular bone to the medial cuneiform.
about_node: HP:0020352

