id: uuid:dd11b10c-f03f-4f31-8f6a-10b99ad8edc7
type: NewTextDefinition
new_value: Blockage of the posterior circumflex humeral artery (PCHA), which arises
  from the third part of the axillary artery and supplies the shoulder joint and a
  number of its associated muscles. The lesion can be ascertained angiographically,
  whereby dye is injected both with patient's humerus at the side of the body and
  again with shoulder held in abduction and external rotation. Test is positive if
  there is evidence of PCHA occlusion with arm in abduction and external rotation
  but artery is patent when arm is held at the side.
about_node: HP:0020318

