id: uuid:cb317dc3-e212-4cae-967a-f80992ec52a6
type: NewTextDefinition
new_value: 'Malignant melanotic nerve sheath tumors (MMNSTs) are uncommon pigmented
  tumors of Schwann cell origin, most often found along the spinal nerves. MMNSTs
  were formerly known as melanotic schwannoma. Although MMNSTs can occur along cranial
  nerves, they tend to grow along the dorsal spinal nerve roots, and patients often
  present with indolent pain, weakness, or paresthesia along a corresponding dermatome.
  On imaging, spinal MMNSTs generally appear similar to the appearance presented in
  the current case: intradural, extramedullary tumors. In the spine, the tumors typically
  grow along spinal nerve roots, sometimes assuming a dumbbell configuration if they
  extend through a foramen. Tumors demonstrate enhancement on CT and are FDG-avid
  on PET.'
about_node: HP:0020338

