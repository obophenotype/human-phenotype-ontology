id: uuid:0bea9800-11ed-4bbb-9d2e-3b34383ef1af
type: NewTextDefinition
new_value: Focal, regional or diffuse magnetic resonance imaging (MRI) enhancement
  of intracranial perivascular spaces (PVS). This enhancement pattern is recognizable
  by its topography that follows PVS distribution, particularly identifiable in regions
  where PVS predominate (centra semiovalia, basal ganglia and the brachium pontis)15
  although it can be found throughout the whole brain. Depending on the perpendicular
  or parallel orientation of MRI sections to the long axis of PVS, enhanced PVS appear
  as dots or curvilinear elements respectively. Depending on the causal pathology,
  PVE may appear more linear or nodular.
about_node: HP:6001464

