type: ClassCreation
about_node: HP:6001481
name: Positive hair pull test

---
id: uuid:ef7927e6-e475-4a02-b683-76bb1a1b9d81
type: NewTextDefinition
new_value: An abnormal result of the hair pull test, in which the clinician selects
  50 to 60 hairs and holds the bundle close to the scalp between the thumb, index
  finger, and long finger. The clinician then firmly pulls on the bundle using slow
  traction as the fingers slide down the hair shaft, avoiding a fast and forceful
  tug. The hair pulls are performed at the vertex, parietal areas, and the occipital
  area of the scalp. Next, the pulled hairs are counted. Any broken hairs that were
  extracted from the bundle during the pull are discarded. If more than 10 percent
  of the hairs in each bundle are removed from a scalp area, the hair pull test is
  considered positive.
about_node: HP:6001481

