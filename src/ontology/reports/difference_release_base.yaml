  (COMT) to form their inactive metabolites metanephrine, normetanephrine and 3-methoxytyramine
  (3-MT). When there is an indication for biochemical testing, such as suspicion of
  pheochromocytoma, metanephrine and normetanephrine metabolites are measured in plasma
  or 24-hour urine. This term represents an elevation of the concentration of metanephrine
  and normetanephrine in the blood circulation above the upper limit of normal.
