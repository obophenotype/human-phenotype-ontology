id: uuid:5fa96f9c-0257-4a50-bb79-c64ea9881ab1
type: NewTextDefinition
new_value: An increased susceptibility to bacterial infection of the skin, as manifested
  by a recurrent or severe cutaneous bacterial infection, or by a skin infection caused
  by an atypical or opportunistic organism. Common causative organisms include Staphylococcus
  aureus and Streptococcus species. A recurrent bacterial skin infection can be a
  manifestation of phagocyte defects, hyper-IgE syndrome, and atopic dermatitis-related
  immune defects.
