id: uuid:c7d313db-f593-46c0-8bf1-c6b7697e917c
type: NodeTextDefinitionChange
old_value: Weakness in the supporting structures of the pelvic floor allowing the
  pelvic viscera to descend or one or more of the pelvic organs drop from their normal
  position.
new_value: Pelvic organ prolapse (POP) refers to the protrusion of one or more female
  pelvic organs outside the pelvis through the vagina including uterus, bladder and
  intestines, and causes the pelvic organs to drop downward to the vaginal wall. That
  is, POP is defined as the anatomical prolapse with descent of at least one of the
  vaginal walls to or beyond the vaginal hymen with maximal Valsalva effort with the
  presence either of bothersome characteristic symptoms, most commonly the sensation
  of vaginal bulge, or of functional or medical compromise due to prolapse without
  symptom bother.
about_node: HP:0031607

