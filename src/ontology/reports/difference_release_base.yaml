  normal osteoclasts initiate the process at affected skeletal sites, and the increase
  in bone resorption is followed by an increase in new bone formation, altering bone
  architecture.
new_value: Paget's disease of bone (PDB) is a chronic progressive metabolic bone disease
  characterized by abnormal activation of osteoclasts that results in abnormal bone
  resorption and compensatory osteogenic sclerosis. DB can affect one (monostotic
  form) or more (polyostotic form) regions of the skeleton, with multiple constitutive
  symptoms, including bone pain, bone deformity, pathological fracture, tinnitus,
  hearing loss, vision loss, and osteoarthritis.
