  links the insulin A and B chains in proinsulin, providing thereby a means to promote
  their efficient folding and assembly in the endoplasmic reticulum during insulin
  biosynthesis. After cleavage of proinsulin, C-peptide is stored with insulin in
  the soluble phase of the secretory granules and is subsequently released in equimolar
  amounts with insulin, providing a useful independent indicator of insulin secretion.
new_value: Any deviation from the normal concentration of C-peptide in the blood circulation.
about_node: HP:0030794

