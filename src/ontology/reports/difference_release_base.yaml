id: uuid:84fafc94-1bc8-4e8b-958b-18f14fa0414e
type: NewTextDefinition
new_value: An anomaly observed by full-field electroretinogram (ffERG). The ffERG
  measures the light-induced electrical activity of the retina at the corneal surface.
  Specifically, the ffERG records the global or total retinal electrical response
  to a full-field (Ganzfield) light stimulus. Isolation of the rod and cone components
  has important diagnostic value in differentiating between various retinal diseases.
  Modifying the properties of the light-stimulus (wavelength, strength, and flicker
  rate) as well as the adaptive state of the retina can separate the rod and cone
  functions of the ffERG.
about_node: HP:0030466

